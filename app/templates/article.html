<!doctype html>
<html lang="en-US">

    <!-- Head of the webpage-->
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Yannick Verheugen" />
        <meta name="description" content="The Philosophers Blog aims to be a place for discussions on all common and uncommon topics of philosophy. This includes for example Ethics, Metaphysics but also Existentialism and Political Philosophy" />
        <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}" />
        <title>The Philosophers Blog</title>
    </head>

    <!-- Navigation of the webpage-->
        <nav>
            <div class="topnav">
                <a href="{{ url_for('simple_pages.index') }}">Home</a>
                <a href="{{ url_for('articles.list_articles') }}">Articles</a>
                <a href="{{ url_for('simple_pages.topics') }}">Topics</a>
                <a href="{{ url_for('simple_pages.about') }}">About</a>
                <a href="{{ url_for('simple_pages.contact') }}">Contact</a>
            </div>
        </nav>

    <!-- Hero of the articles page-->
        <header class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>Articles</h1>
                <p class="Subheading"><strong>Read the latest articles on various philosophical topics.</strong></p>
            </div>
        </header>

    <!-- Header of the articles page-->
    <body>
        <header>
            <h1>The Philosophers Blog</h1>
        </header>

        <article>
            <h1>{{ post.title }}</h1>
            <p class="meta">By {{ post.author }}</p>
            <div class="content">
                {{ post.content }}
            </div>
        </article>

    <!-- Footer of the webpage-->
        <footer>
            <p>&copy; 2026 The Philosophers Blog. All rights reserved.</p>
        </footer>
    </body>
